version: '3.8'

services:
  ama-backend:
    build: .
    ports:
      - "8081:8081"
    volumes:
      - ./data:/app/data
    environment:
      CHROMA_HOST: chroma
      CHROMA_PORT: 6000
      LLAMA_PORT: 42069
      LLAMA_HOST: llama_server
      LLM_BASE_URL: http://llama-server:8080/v1
      PHOTOS_DIR: /mnt/f/immich-photos
      HF_CACHE: /mnt/f/hf-cache
    depends_on:
      llama-server:
        condition: service_healthy

  ama-frontend:
    build: ./photo-library-ama-ui
    ports:
      - "2398:2398"
    depends_on:
      - ama-backend

  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    ports:
      - "42069:8080"
    volumes:
      - /mnt/f/models:/mnt/f/models
    environment:
      LLAMA_ARG_MODEL: /mnt/f/models/Qwen_Qwen3.5-9B-Q4_K_M.gguf
      LLAMA_ARG_CTX_SIZE: 4096
      LLAMA_ARG_N_GPU_LAYERS: 99
      LLAMA_ARG_PORT: 8080
      LLAMA_ARG_HOST: 0.0.0.0
      LLAMA_ARG_N_PARALLEL: 1
      LLAMA_ARG_FLASH_ATTN: 1
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [compute,utility]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "6000:8000"
    volumes:
      - ./data/chroma_db:/data
