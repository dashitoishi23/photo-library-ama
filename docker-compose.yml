version: '3.8'

networks:
  ama-network:
    driver: bridge

services:
  ama-backend:
    container_name: ama-backend
    build: .
    ports:
      - "8081:8081"
    volumes:
      - ./data:/app/data
      - /mnt/f/immich-photos:/app/photos
    environment:
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      LLAMA_PORT: 8080
      LLAMA_HOST: llama_server
      LLM_BASE_URL: http://llama_server:8080/v1
      HF_CACHE: /mnt/f/hf-cache
    networks:
      - ama-network
    depends_on:
      llama_server:
        condition: service_healthy
      chroma:
        condition: service_started

  ama-frontend:
    container_name: ama-frontend
    build: ./photo-library-ama-ui
    ports:
      - "2398:2398"
    environment:
      VITE_BACKEND_HOST: localhost
      VITE_BACKEND_PORT: 8081
    networks:
      - ama-network
    depends_on:
      - ama-backend

  llama_server:
    container_name: llama_server
    image: ghcr.io/ggml-org/llama.cpp:server-cuda13
    ports:
      - "42069:8080"
    volumes:
      - /mnt/f/models:/mnt/f/models
    environment:
      LLAMA_ARG_MODEL: /mnt/f/models/Qwen_Qwen3.5-9B-Q4_K_M.gguf
      LLAMA_ARG_CTX_SIZE: 4096
      LLAMA_ARG_N_GPU_LAYERS: 99
      LLAMA_ARG_PORT: 8080
      LLAMA_ARG_HOST: 0.0.0.0
      LLAMA_ARG_N_PARALLEL: 1
      LLAMA_ARG_FLASH_ATTN: 1
    networks:
      - ama-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  chroma:
    container_name: chroma
    image: chromadb/chroma:latest
    ports:
      - "6000:8000"
    volumes:
      - ./data/chroma_db:/data
    networks:
      - ama-network